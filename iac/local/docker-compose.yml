
services:
  postgres-local:
    image: "postgres:15" 
    container_name: postgres_db_pe_mss
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432" 
    volumes:
      - postgres-data:/var/lib/postgresql/data 
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    name: app-network